# Railway deployment configuration — single service, root Dockerfile
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway sets $PORT automatically; the entrypoint runs migrations then starts uvicorn.
startCommand = "sh -c 'cd /app/apps/api && alembic upgrade head && uvicorn champiq_api.main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 1 --loop uvloop --http httptools'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
