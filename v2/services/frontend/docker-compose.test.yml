version: '3.8'

services:
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      - VITE_API_URL=http://gateway:4001
      - NODE_ENV=test
    depends_on:
      - gateway
      - redis
      - postgres
      - neo4j
    volumes:
      - ./test-results:/app/test-results
      - ./playwright-report:/app/playwright-report
    networks:
      - champiq-test

  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://champiq:champiq_password@postgres:5432/champiq_v2
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=neo4j_password
      - JWT_SECRET=test-jwt-secret
      - INTERNAL_SECRET=test-internal-secret
      - FRONTEND_URL=http://localhost:3001
    ports:
      - "4001:4001"
    depends_on:
      - redis
      - postgres
      - neo4j
    networks:
      - champiq-test
    command: npm run start:dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - champiq-test

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=champiq
      - POSTGRES_PASSWORD=champiq_password
      - POSTGRES_DB=champiq_v2
    ports:
      - "5432:5432"
    networks:
      - champiq-test

  neo4j:
    image: neo4j:5
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - champiq-test

networks:
  champiq-test:
    driver: bridge
