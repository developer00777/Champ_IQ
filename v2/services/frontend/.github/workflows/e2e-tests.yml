name: E2E Tests - ChampIQ V2

on:
  push:
    branches: [main, develop, '**']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  VITE_API_URL: http://localhost:4001

jobs:
  test-e2e:
    name: Run E2E Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/services/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd v2/services/frontend
          npm ci

      - name: Install Playwright browsers
        run: |
          cd v2/services/frontend
          npx playwright install --with-deps chromium

      - name: Build frontend
        run: |
          cd v2/services/frontend
          npm run build

      - name: Start services (Gateway & Frontend)
        run: |
          cd v2/services/frontend
          
          # Start frontend in background
          npm run dev > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          
          # Wait for frontend to be ready
          for i in {1..30}; do
            if curl -s http://localhost:3001 > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 2
          done
          
          # Verify frontend is running
          curl -s http://localhost:3001 | head -c 100

      - name: Wait for services
        run: sleep 10

      - name: Run E2E Tests
        run: |
          cd v2/services/frontend
          npx playwright test --reporter=list
        continue-on-error: true

      - name: Run specific test suites
        run: |
          cd v2/services/frontend
          
          # Test 1: Authentication
          npx playwright test e2e/champaign-flow.spec.ts -g "User Registration" --reporter=list || true
          
          # Test 2: Login
          npx playwright test e2e/champaign-flow.spec.ts -g "User Login" --reporter=list || true
          
          # Test 3: Dashboard
          npx playwright test e2e/champaign-flow.spec.ts -g "Dashboard" --reporter=list || true
          
          # Test 4: Prospect Creation
          npx playwright test e2e/champaign-flow.spec.ts -g "Add Prospect" --reporter=list || true

      - name: Run Complete E2E Flow
        run: |
          cd v2/services/frontend
          npx playwright test e2e/champaign-flow.spec.ts -g "Complete End-to-End" --reporter=list

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: v2/services/frontend/playwright-report/
          retention-days: 7

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: v2/services/frontend/test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          if [ -f /tmp/frontend.pid ]; then
            kill $(cat /tmp/frontend.pid) 2>/dev/null || true
          fi

  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: v2/services/frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd v2/services/frontend
          npm ci

      - name: Run linter
        run: |
          cd v2/services/frontend
          npm run lint

      - name: Build
        run: |
          cd v2/services/frontend
          npm run build
