version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# ChampIQ V2 — Docker Compose (V2 services only)
#
# Connects to the SAME shared infrastructure (Postgres, Redis, Neo4j, Ollama)
# that V1 uses. Only V2-specific services are defined here.
#
# Containers:
#   ai-engine-v2  (FastAPI :8001)
#   gateway-v2    (NestJS  :4001)
#   frontend-v2   (Nginx   :3001)
#
# Start:  docker compose -f docker-compose.v2.yml up --build -d
# Logs:   docker compose -f docker-compose.v2.yml logs -f
# Stop:   docker compose -f docker-compose.v2.yml down
# ─────────────────────────────────────────────────────────────────────────────

networks:
  backend:
    external: true
    name: champiq_backend
  frontend:
    external: true
    name: champiq_frontend

services:

  # ─── AI Engine V2 ───────────────────────────────────────────────────────────

  ai-engine-v2:
    build:
      context: ./services/ai-engine
      dockerfile: Dockerfile
    image: champiq/ai-engine-v2:latest
    restart: unless-stopped
    networks: [backend]
    ports:
      - "8001:8001"
    environment:
      # App
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      HOST: 0.0.0.0
      PORT: 8001
      WORKERS: ${AI_WORKERS:-2}

      # Neo4j (shared)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_DATABASE: neo4j

      # PostgreSQL (shared)
      POSTGRES_URL: postgresql://${POSTGRES_USER:-champiq}:${POSTGRES_PASSWORD:-champiq_password}@postgres:5432/${POSTGRES_DB:-champiq_v2}

      # Redis (shared)
      REDIS_URL: redis://redis:6379/1

      # LLM
      LLM_PROVIDER: ollama
      LLM_BASE_URL: http://ollama:11434/v1
      LLM_MODEL: llama3
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.7}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-4096}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-120}

      # OpenRouter fallback
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-minimax/minimax-m2.5}

      # Embedding
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_BASE_URL: http://ollama:11434/v1
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-embeddinggemma}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}

      # Graphiti
      GRAPHITI_ENABLED: ${GRAPHITI_ENABLED:-true}
      GRAPHITI_GROUP_ID: ${GRAPHITI_GROUP_ID:-champiq_v2}

      # Gateway bridge
      GATEWAY_URL: http://gateway-v2:4001
      INTERNAL_SECRET: ${INTERNAL_SECRET:-champiq-v2-internal-secret}

      # SMTP
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-insights@lakeb2b.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-LakeB2B Insights}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}

      # IMAP
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_USE_SSL: ${IMAP_USE_SSL:-true}

      # V2 Pipeline
      IMAP_WAIT_HOURS: ${IMAP_WAIT_HOURS:-24}
      PITCH_MODEL: ${PITCH_MODEL:-}

      # ElevenLabs (per-agent)
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_PHONE_NUMBER_ID: ${ELEVENLABS_PHONE_NUMBER_ID:-}
      ELEVENLABS_QUALIFIER_AGENT_ID: ${ELEVENLABS_QUALIFIER_AGENT_ID:-}
      ELEVENLABS_SALES_AGENT_ID: ${ELEVENLABS_SALES_AGENT_ID:-}
      ELEVENLABS_NURTURE_AGENT_ID: ${ELEVENLABS_NURTURE_AGENT_ID:-}
      ELEVENLABS_AUTO_AGENT_ID: ${ELEVENLABS_AUTO_AGENT_ID:-}

      # CHAMP
      CHAMP_WEIGHT_CHALLENGES: ${CHAMP_WEIGHT_CHALLENGES:-0.30}
      CHAMP_WEIGHT_AUTHORITY: ${CHAMP_WEIGHT_AUTHORITY:-0.25}
      CHAMP_WEIGHT_MONEY: ${CHAMP_WEIGHT_MONEY:-0.20}
      CHAMP_WEIGHT_PRIORITIZATION: ${CHAMP_WEIGHT_PRIORITIZATION:-0.25}
      CHAMP_TIER_HOT: ${CHAMP_TIER_HOT:-80}
      CHAMP_TIER_WARM: ${CHAMP_TIER_WARM:-60}
      CHAMP_TIER_COOL: ${CHAMP_TIER_COOL:-40}

      # Workers
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
      WORKER_RETRY_DELAY: ${WORKER_RETRY_DELAY:-300}
      WORKER_TIMEOUT: ${WORKER_TIMEOUT:-600}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Gateway V2 ─────────────────────────────────────────────────────────────

  gateway-v2:
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
    image: champiq/gateway-v2:latest
    restart: unless-stopped
    networks: [backend, frontend]
    depends_on:
      ai-engine-v2:
        condition: service_healthy
    ports:
      - "4001:4001"
    environment:
      PORT: 4001
      NODE_ENV: ${NODE_ENV:-production}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}

      # PostgreSQL (shared)
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-champiq_v2}
      POSTGRES_USER: ${POSTGRES_USER:-champiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-champiq_password}

      # Redis (shared)
      REDIS_HOST: redis
      REDIS_PORT: 6379

      # JWT
      JWT_SECRET: ${JWT_SECRET:-champiq-v2-jwt-secret-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}

      # AI Engine V2
      AI_ENGINE_URL: http://ai-engine-v2:8001

      # Internal secret
      INTERNAL_SECRET: ${INTERNAL_SECRET:-champiq-v2-internal-secret}

      # ElevenLabs
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_PHONE_NUMBER_ID: ${ELEVENLABS_PHONE_NUMBER_ID:-}
      ELEVENLABS_QUALIFIER_AGENT_ID: ${ELEVENLABS_QUALIFIER_AGENT_ID:-}
      ELEVENLABS_SALES_AGENT_ID: ${ELEVENLABS_SALES_AGENT_ID:-}
      ELEVENLABS_NURTURE_AGENT_ID: ${ELEVENLABS_NURTURE_AGENT_ID:-}
      ELEVENLABS_AUTO_AGENT_ID: ${ELEVENLABS_AUTO_AGENT_ID:-}

      # V2 Pipeline defaults
      IMAP_WAIT_HOURS: ${IMAP_WAIT_HOURS:-24}
      PITCH_MODEL: ${PITCH_MODEL:-}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # ─── Frontend V2 ────────────────────────────────────────────────────────────

  frontend-v2:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4001}
    image: champiq/frontend-v2:latest
    restart: unless-stopped
    networks: [frontend]
    depends_on:
      gateway-v2:
        condition: service_healthy
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
